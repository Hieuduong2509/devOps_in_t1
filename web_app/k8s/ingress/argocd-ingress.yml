apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Cấu hình quan trọng cho gRPC của ArgoCD
    traefik.ingress.kubernetes.io/router.middlewares: argocd-grpc-middleware@kubernetescrd 
    # Nếu không muốn cấu hình phức tạp, hãy dùng cách đơn giản hóa dưới đây:
    traefik.ingress.kubernetes.io/service.serversscheme: h2c 
spec:
  ingressClassName: traefik
  rules:
  - host: argocd.devoops.shop
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80 # ArgoCD Service thường map cổng 80 vào 8080