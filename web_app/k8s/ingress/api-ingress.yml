apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: all-ingress
  namespace: observability
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: observability-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: api.devoops.shop
    http:
      paths:
      - path: /api 
        pathType: Prefix
        backend:
          service:
            name: node-api-service
            port:
              number: 80
  - host: grafana.devoops.shop
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-grafana
            port:
              number: 80