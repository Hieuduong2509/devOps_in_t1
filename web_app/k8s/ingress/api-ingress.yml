apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: all-ingress
  namespace: observability  # <--- THÊM DÒNG NÀY VÀO
spec:
  ingressClassName: traefik
  rules:
  - host: api.devoops.shop
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: node-api-service # Đảm bảo node-api cũng được chuyển sang observability
            port:
              number: 80
  - host: grafana.devoops.shop
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-grafana
            port:
              number: 80