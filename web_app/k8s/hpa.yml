apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-api
  template:
    metadata:
      labels:
        app: node-api
    spec:
      containers:
      - name: node-api
        image: hieuduong2509/my_node_api:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"     
            memory: "128Mi"  
          limits:
            cpu: "500m"      
            memory: "256Mi" 