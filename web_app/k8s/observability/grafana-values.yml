adminPassword: admin
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://my-prometheus-server.observability.svc.cluster.local:80
      access: proxy
      isDefault: true
    - name: Loki
      type: loki
      url: http://my-loki.observability.svc.cluster.local:3100
      access: proxy
    - name: Tempo
      type: tempo
      url: http://my-tempo.observability.svc.cluster.local:3100
      access: proxy