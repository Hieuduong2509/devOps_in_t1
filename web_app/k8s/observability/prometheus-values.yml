# Tắt bớt các thành phần cảnh báo không cần thiết để tiết kiệm RAM cho máy chủ
alertmanager:
  enabled: false
pushgateway:
  enabled: false

serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
        - role: node
      
      - job_name: 'node-api'
        static_configs:
          - targets: ['node-api-service.default.svc.cluster.local:80']