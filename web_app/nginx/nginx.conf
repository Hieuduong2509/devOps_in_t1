events {}
http {
    # 1. Đón khách ở cửa 80 và điều hướng toàn bộ sang HTTPS
    server {
        listen 80;
        server_name devoops.shop www.devoops.shop;
        return 301 https://$host$request_uri;
    }

    # 2. Mở cửa VIP 443 và gắn ổ khóa bảo mật
    server {
        listen 443 ssl;
        server_name devoops.shop www.devoops.shop;

        # Đường dẫn tới bộ chìa khóa Let's Encrypt của bạn
        ssl_certificate /etc/letsencrypt/live/devoops.shop/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/devoops.shop/privkey.pem;

        location /api {
            proxy_pass http://172.31.27.14:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
	rewrite ^/grafana$ /grafana/ permanent;
        location /grafana {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
	        proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        location / {
            default_type text/html;
            return 200 '<html><body><h1>HTTPS is working perfectly on devoops.shop!</h1></body></html>';
        }
    }
}
