events {}
http {
    server {
        listen 80;
        server_name devoops.shop www.devoops.shop;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name devoops.shop www.devoops.shop;

        ssl_certificate /etc/letsencrypt/live/devoops.shop/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/devoops.shop/privkey.pem;

        location /api {
            proxy_pass http://172.31.27.14:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /grafana/api/live/ {
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $http_host;
        }
        
        location / {
            default_type text/html;
            return 200 '<html><body><h1>HTTPS is working perfectly on devoops.shop!</h1></body></html>';
        }
    }

    # 1. Tự động chuyển hướng từ HTTP (80) sang HTTPS (443)
server {
    listen 80;
    server_name argocd.devops.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name argocd.devoops.shop;

    ssl_certificate /etc/letsencrypt/live/argocd.devops.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/argocd.devops.shop/privkey.pem;

    location / {
        proxy_pass https://50.19.98.81:32364; 
        proxy_ssl_verify off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
}
