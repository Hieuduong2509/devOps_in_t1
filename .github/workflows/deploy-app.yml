name: CI/CD Pipeline - FastAPI Application

on:
  push:
    branches:
      - main
    paths:
      - 'web_app/node_api/**'
      - 'web_app/api-deploy.yaml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./web_app/node_api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:latest

      - name: Deploy to K3s (Instance 2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.INSTANCE2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/devOps_in_t1/web_app
            git pull origin main
            sudo kubectl apply -f api-deploy.yaml
            sudo kubectl rollout restart deployment fastapi-deployment