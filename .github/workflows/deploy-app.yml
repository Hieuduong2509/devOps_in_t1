name: CI/CD Pipeline - FastAPI Application

on:
  push:
    branches:
      - main
jobs:
  ci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Kéo code từ GitHub về máy chủ Actions
        uses: actions/checkout@v3

      - name: Cài đặt môi trường Python ảo
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cài đặt công cụ Flake8
        run: pip install flake8

      - name: Quét lỗi file main.py
        working-directory: ./web_app/node_api
        run: |
          flake8 main.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 main.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Quét lỗ hổng bảo mật thư viện (Dependencies Check)
        working-directory: ./web_app/node_api
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

      - name: Kiểm tra cú pháp toàn bộ file YAML
        run: |
          pip install yamllint
          yamllint .

      - name: Kiểm tra tối ưu Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./web_app/node_api/Dockerfile

      - name: Cài đặt thư viện cho Unit Test
        working-directory: ./web_app/node_api
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Chạy Unit Test
        working-directory: ./web_app/node_api
        run: |
          pytest test_main.py -v
      
      - name: Build nháp Docker Image
        working-directory: ./web_app/node_api
        run: |
          docker build -t fastapi-app:latest .

      - name: Kiểm tra Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fastapi-app:latest
          format: table
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH,MEDIUM'

  build-and-deploy:
    needs: ci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./web_app/node_api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:latest

      - name: Deploy to K3s (Instance 2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.INSTANCE2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY_INSTANCE2 }}
          script: |
            cd ~/devOps_in_t1/web_app
            git pull origin main
            sudo kubectl apply -f api-deploy.yaml
            sudo kubectl rollout restart deployment fastapi-deployment